<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Кампания — Sales Manager</title>
<link rel="stylesheet" href="./style.css">
<style>
  .tabs { display: flex; gap: 1em; border-bottom: 1px solid #ccc; margin-bottom: 1em; }
  .tab { padding: 0.5em 1em; cursor: pointer; }
  .tab.active { border-bottom: 2px solid #007acc; font-weight: bold; }
  .field { margin: 0.5em 0; }
  .field label { display: block; font-weight: bold; color: #555; margin-bottom: 0.2em; }
  .field textarea, .field input { width: 100%; padding: 0.4em; box-sizing: border-box; }
  table { width: 100%; border-collapse: collapse; margin-top: 1em; }
  td, th { padding: 0.4em 0.6em; border-bottom: 1px solid #eee; text-align: left; }
  th { background: #f5f5f5; }
  nav { margin-bottom: 1em; }
</style>
</head>
<body>
  <header style="display:flex; justify-content:space-between; align-items:center; padding: 12px 24px; border-bottom: 1px solid #333;">
    <div>
      <h1 id="campaign-title" style="margin:0; font-size:20px;">Кампания</h1>
      <nav style="margin-top:4px; font-size: 13px;"><a href="./sales.html">← Все кампании</a></nav>
    </div>
    <div style="display:flex; gap:8px;">
      <a href="./index.html" style="padding:6px 12px; border:1px solid #444; border-radius:4px; text-decoration:none; color:#888; font-size:13px;">🔎 Парсер</a>
    </div>
  </header>
  <main>
    <div class="tabs">
      <div class="tab active" data-tab="brief">Бриф</div>
      <div class="tab" data-tab="leads">Лиды</div>
      <div class="tab" data-tab="stats">Метрики</div>
    </div>
    <section id="tab-brief"></section>
    <section id="tab-leads" hidden></section>
    <section id="tab-stats" hidden></section>
  </main>
  <script src="./sales-campaign.js"></script>
</body>
</html>
