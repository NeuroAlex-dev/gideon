<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Sales Manager — Кампании</title>
<link rel="stylesheet" href="./style.css">
<style>
  .campaign-card { border: 1px solid #ccc; padding: 1em; margin: 0.5em 0; border-radius: 6px; }
  .campaign-card .meta { color: #888; font-size: 0.9em; margin: 0.3em 0; }
  .status-running { color: #2a8f3e; font-weight: bold; }
  .status-paused { color: #d68f00; font-weight: bold; }
  .status-draft { color: #888; }
  .status-ready { color: #007acc; }
  .status-completed { color: #555; }
  nav { margin-bottom: 1em; }
  nav a { margin-right: 1em; }
  .auth-form { max-width: 320px; margin: 2em auto; padding: 1em; border: 1px solid #ddd; border-radius: 6px; }
  .setup-hint { background: rgba(82,136,193,0.15); border: 1px solid var(--accent, #5288c1); padding: 10px; border-radius: 6px; margin-bottom: 12px; font-size: 14px; }
  .campaign-card .card-actions { display: flex; gap: 8px; align-items: center; margin-top: 0.5em; flex-wrap: wrap; }
  .campaign-card .card-actions a, .campaign-card .card-actions button {
    padding: 6px 12px;
    border-radius: 4px;
    border: 1px solid var(--border, #444);
    background: transparent;
    color: var(--text, #ddd);
    text-decoration: none;
    cursor: pointer;
    font-size: 13px;
  }
  .campaign-card .card-actions a:hover, .campaign-card .card-actions button:hover { border-color: var(--accent, #5288c1); }
  .campaign-card .card-actions .delete-btn:hover { color: #e57373; border-color: #e57373; }
  #new-campaign-btn {
    padding: 10px 16px;
    background: var(--accent, #5288c1);
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
  }
  #new-campaign-btn:hover { opacity: 0.9; }
  #campaigns-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1em; padding: 0 24px; }
  #header-actions { display: flex; gap: 8px; align-items: center; }
  #header-actions a, #header-actions button {
    background: transparent;
    color: var(--muted, #888);
    border: 1px solid var(--border, #444);
    padding: 6px 12px;
    border-radius: 4px;
    font-size: 13px;
    text-decoration: none;
    cursor: pointer;
  }
  #header-actions a:hover, #header-actions button:hover { color: var(--text, #ddd); border-color: var(--accent, #5288c1); }
  header { display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; border-bottom: 1px solid var(--border, #333); }
  header h1 { margin: 0; font-size: 20px; }
</style>
</head>
<body>
  <header>
    <h1>Sales Manager · Кампании</h1>
    <div id="header-actions">
      <a href="./index.html">🔎 Парсер</a>
      <button id="logout-btn" type="button">Выйти</button>
    </div>
  </header>
  <main>
    <div id="auth-section" class="auth-form" hidden>
      <div id="setup-hint" class="setup-hint" hidden>
        Пароль ещё не создан. Открой <a href="./index.html">парсер</a> и задай его — он будет общим для обеих систем.
      </div>
      <h3>Вход</h3>
      <p style="font-size: 13px; color: #888; margin-top: -4px;">Тот же пароль, что для парсера.</p>
      <input id="pwd" type="password" placeholder="Пароль" autocomplete="current-password" style="width: 100%; padding: 0.5em; box-sizing: border-box;">
      <button id="login" style="margin-top: 0.5em; width: 100%; padding: 0.5em;">Войти</button>
      <div id="auth-error" style="color: red; margin-top: 0.5em;"></div>
    </div>
    <div id="campaigns-section" hidden>
      <div id="campaigns-toolbar">
        <button id="new-campaign-btn" type="button">+ Создать кампанию</button>
      </div>
      <div id="campaigns-list" style="padding: 0 24px;"></div>
    </div>
  </main>
  <script src="./sales.js"></script>
</body>
</html>
